<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poppy Playtime Mechanics - Polished</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; }
        #ui {
            position: absolute; top: 15px; left: 15px; color: white;
            background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 10px;
            pointer-events: none; user-select: none; border: 2px solid #333;
        }
        #ui h2 { margin: 0 0 10px 0; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        #handStatus { font-size: 18px; font-weight: bold; color: #ff4444; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 12px; height: 12px;
            background: rgba(255, 255, 255, 0.8); border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; border: 2px solid rgba(0,0,0,0.5);
        }
        #blocker {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.7);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; cursor: pointer; z-index: 10; text-align: center;
        }
        .key { background: #333; padding: 4px 8px; border-radius: 4px; border: 1px solid #777; font-weight: bold; }
    </style>
</head>
<body>

    <div id="blocker">
        <h1 style="font-size: 48px; margin-bottom: 10px; text-shadow: 2px 2px 0 #ff0000;">CLICK TO PLAY</h1>
        <p style="font-size: 20px;">Use <span class="key">W A S D</span> to Move | <span class="key">SPACE</span> to Jump | Mouse to Look</p>
        <p style="font-size: 20px; color: #aaa;">Switch Hands: <span class="key">1</span> Red | <span class="key">2</span> Pressure (Blue) | <span class="key">3</span> Conductive (Yellow)</p>
        <p style="font-size: 20px; color: #88ccff;">Left Click to Fire! (Use Pressure Hand to break the blue glass blocks)</p>
    </div>

    <div id="ui">
        <h2>GrabPack Status</h2>
        <div id="handStatus">Current: RED (Default)</div>
    </div>
    
    <div id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 1. SCENE SETUP (With Shadow Support) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a); // Darker, creepier atmosphere
        scene.fog = new THREE.Fog(0x0a0a0a, 10, 60);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 2;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // FIX: Enabled realistic shadows
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING (Fixed for Depth) ---
        const ambientLight = new THREE.AmbientLight(0x404040, 0.6); // Slightly darker ambient
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2); // Brighter directional
        dirLight.position.set(15, 30, 15);
        dirLight.castShadow = true; // FIX: Light now casts shadows
        dirLight.shadow.camera.top = 25;
        dirLight.shadow.camera.bottom = -25;
        dirLight.shadow.camera.left = -25;
        dirLight.shadow.camera.right = 25;
        scene.add(dirLight);

        // --- 3. ENVIRONMENT (Grid Facility & Glass) ---
        // Solid Floor
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true; // FIX: Floor catches shadows
        scene.add(floor);

        // Facility Grid (Makes it look like a cool test chamber)
        const gridHelper = new THREE.GridHelper(100, 50, 0x444444, 0x222222);
        gridHelper.position.y = 0.01; // Slightly above floor to prevent Z-fighting
        scene.add(gridHelper);

        // Glass Blocks (Obstacles)
        const glassBlocks = [];
        const glassGeo = new THREE.BoxGeometry(2, 4, 2);
        const glassMat = new THREE.MeshStandardMaterial({ 
            color: 0x44aaff, transparent: true, opacity: 0.6, roughness: 0.1, metalness: 0.5 
        });

        // Spawn 8 random glass blocks
        for (let i = 0; i < 8; i++) {
            const glass = new THREE.Mesh(glassGeo, glassMat);
            glass.position.set((Math.random() - 0.5) * 40, 2, (Math.random() - 0.5) * -40 - 10);
            glass.castShadow = true;
            glass.receiveShadow = true;
            glass.userData = { isGlass: true }; 
            scene.add(glass);
            glassBlocks.push(glass);
        }

        // --- 4. FIRST PERSON CONTROLS & PHYSICS (Fixed) ---
        const controls = new PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');

        blocker.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => blocker.style.display = 'none');
        controls.addEventListener('unlock', () => blocker.style.display = 'flex');

        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = false;

        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        document.addEventListener('keydown', (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': 
                    if (canJump) {
                        velocity.y = 30; // FIX: Adjusted jump force to actually work
                        canJump = false; 
                    }
                    break;
            }
        });

        document.addEventListener('keyup', (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });

        // --- 5. GRABPACK MECHANICS ---
        let currentHand = 'Red'; 
        const handStatusUI = document.getElementById('handStatus');

        // Visual Hand Model
        const handGeo = new THREE.BoxGeometry(0.25, 0.25, 0.8);
        const handMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const handMesh = new THREE.Mesh(handGeo, handMat);
        handMesh.position.set(0.5, -0.4, -0.8);
        handMesh.castShadow = true; // Hand casts a shadow now!
        camera.add(handMesh);
        scene.add(camera);

        document.addEventListener('keydown', (event) => {
            if (event.code === 'Digit1') {
                currentHand = 'Red';
                handMat.color.setHex(0xff0000); 
                handStatusUI.innerText = "Current: RED (Grapple)";
                handStatusUI.style.color = "#ff4444";
            } else if (event.code === 'Digit2') {
                currentHand = 'Pressure';
                handMat.color.setHex(0x0044ff); 
                handStatusUI.innerText = "Current: PRESSURE (Breaks Glass)";
                handStatusUI.style.color = "#4488ff";
            } else if (event.code === 'Digit3') {
                currentHand = 'Conductive';
                handMat.color.setHex(0xffcc00); 
                handStatusUI.innerText = "Current: CONDUCTIVE (Power)";
                handStatusUI.style.color = "#ffcc00";
            }
        });

        // --- 6. SHOOTING & GLASS BREAKING ---
        const raycaster = new THREE.Raycaster();
        
        document.addEventListener('mousedown', (event) => {
            if (!controls.isLocked) return;
            if (event.button !== 0) return; 

            // Smooth punch animation
            handMesh.position.z = -1.4;
            setTimeout(() => { handMesh.position.z = -0.8; }, 120);

            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(glassBlocks);

            if (intersects.length > 0) {
                const hitObject = intersects[0].object;
                const distance = intersects[0].distance;

                if (distance < 12) { // Grab range
                    if (currentHand === 'Pressure' && hitObject.userData.isGlass) {
                        // Shrink animation before breaking (makes it feel impactful)
                        hitObject.scale.set(0.8, 0.8, 0.8);
                        setTimeout(() => {
                            scene.remove(hitObject);
                            glassBlocks.splice(glassBlocks.indexOf(hitObject), 1);
                        }, 50);
                    }
                }
            }
        });

        // --- 7. MAIN GAME LOOP ---
        let prevTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();

            if (controls.isLocked) {
                const delta = (time - prevTime) / 1000;

                // FIX: Corrected physics formulas for smooth movement and falling
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 10.0 * delta; // Realistic gravity scaling

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); 

                const moveSpeed = 60.0; // Player running speed

                if (moveForward || moveBackward) velocity.z -= direction.z * moveSpeed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * moveSpeed * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                controls.getObject().position.y += (velocity.y * delta); 

                // Floor Collision
                if (controls.getObject().position.y < 2) {
                    velocity.y = 0;
                    controls.getObject().position.y = 2;
                    canJump = true;
                }
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        animate();

        // Handle Window Resizing properly so the game never stretches
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
